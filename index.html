<!doctype html><html><head><meta charset="UTF-8"><title>QA and testing in software development</title><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><link rel="icon" type="image/png" href="favicon.ico"><link rel="stylesheet" href="https://unpkg.com/reactflow/dist/style.css"><script src="https://unpkg.com/reactflow/dist/umd/index.js"></script><script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script><style>body{font-family:Arial;margin:0;padding:16px;background:#fafafa}#root{min-height:95vh}.layout{display:flex;gap:10px}.diagram{flex:1;border:1px solid #999;background:#fff;height:100%}.sidebar{width:320px;display:grid;grid-template-rows:repeat(3,1fr);gap:10px;height:100%}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;min-height:0;display:flex;flex-direction:column}.card ul{list-style:none;padding:0;margin:0;overflow:auto;flex:1;min-height:0}.card li{font-size:12px;padding:3px 0;cursor:pointer}</style></head><body><div id="root"></div><script>const{useState:useState,useMemo:useMemo,useCallback:useCallback,useRef:useRef,useEffect:useEffect}=React,RF=window.ReactFlow,{ReactFlow:ReactFlow,Background:Background,Controls:Controls,MiniMap:MiniMap,Handle:Handle,Position:Position,MarkerType:MarkerType}=RF,rawNodes=[{key:"title",category:"text",text:"High-level aim"},{key:"overallAim",category:"text",text:"Two sides of the same coin:"},{key:"addValue",category:"coin",text:"Ensure releases to the live system add value"},{key:"stopIssues",category:"coin",text:"Minimise the likelihood of issues occurring in the live system"},{key:"examplesOfIssues",category:"example",text:"Examples of issues:\nCustomers can no longer buy products.\nSystem crashes when there are many simultaneous users (i.e. under high load).\nSystem exposes sensitive data to unauthorised parties."},{key:"costEffective",category:"principle",text:"Work in the most cost-effective way"},{key:"mitigateMostRisk",category:"principle",text:"Consider where best to deploy resources in order to mitigate the most risk"},{key:"optimiseArchitectureAndInfrastructure",category:"principle",text:"Optimise architecture & infrastructure"},{key:"mitigateRisksInLiveSystem",category:"principle",text:"Mitigate risk in the live system"},{key:"optimiseAvailability",category:"principle",text:"Optimise availability of the live system"},{key:"examplesOfWaysToOptimiseAvailabilityCapacityAndTrafficManagement",category:"example",text:"Examples of ways to optimise availability - capacity and traffic management:\nUse a CDN to serve static assets.\nConfigure auto-horizontal scaling.\nImplement load shedding for overload conditions."},{key:"examplesOfWaysToOptimiseAvailabilityHighAvailabilityArchitecture",category:"example",text:"Examples of ways to optimise availability - high availability architecture:\nUse a multi-region deployment strategy.\nEliminate single points of failure through redundancy (no single points of failure).\nEnsure automatic failover between instances / services."},{key:"examplesOfWaysToOptimiseAvailabilityServiceResilience",category:"example",text:"Examples of ways to optimise availability - service resilience:\nSet up health checks and automatic restarts.\nIntroduce timeout funnels for inter-service requests.\nUse circuit breakers for failing dependencies.\nConfigure retries with exponential backoff for transient failures."},{key:"examplesOfWaysToOptimiseAvailabilityRecoveryAndDataProtection",category:"example",text:"Examples of ways to optimise availability - recovery and data protection:\nEnsure the system can recover correctly after outages.\nProvide backup and restore mechanisms that maintain data integrity."},{key:"rollOutFeatures",category:"principle",text:"Introduce mechanisms to roll out new features in a controlled manner (progressive delivery)"},{key:"examplesOfWaysToRollOutFeatures",category:"example",text:"Examples of mechanisms to roll out features in a controlled manner:\nFeature flags to quickly roll back features if necessary.\nCanary releases to gradually expose features to users and gain feedback on how the features perform before rolling them out widely.\nA/B testing to present different versions to users and gain feedback."},{key:"easyDeploymentOfIsolatedFixes",category:"principle",text:"Ensure code is split in a way which allows easy deployment of an isolated fix or change"},{key:"independentlyDeployableMicroservices",category:"action",text:"Depending on the maturity of the system, consider setting up independently deployable microservices (either in a monorepo or in multiple distinct repos)"},{key:"minimiseTimeToDetectAndResolveIssues",category:"principle",text:"Minimise the time to detect and fix issues"},{key:"identifyRootCauseOfFailure",category:"principle",text:"When a test fails, ensure the root cause can be identified quickly and easily"},{key:"examplesOfFailureIdentification",category:"example",text:"Examples of ways to help identify failures:\nTest reports include detailed error messages and logs.\nMake available logs for services tested by black box tests, e.g. by uploading the logs as artifacts on CI.\nUI / user journey tests: reports include screenshots or video recordings (in particular, you can include a screenshot where the issue occurs PLUS the screen before, for context).\nTest code is easy to debug."},{key:"makeTeamAwareOfLiveIssues",category:"principle",text:"Make the team aware as soon as an issue occurs in the live system"},{key:"configureAlerts",category:"action",text:"Configure monitoring and alerting (making sure to set suitable thresholds within suitable timeframes to avoid alert fatigue, and to ensure alerts are actionable)"},{key:"examplesOfAlerts",category:"example",text:"Examples of alerts to configure:\nHTTP 5xx errors.\nErrors and exceptions logged by the application.\nPerformance degradation (e.g. increased response times, timeouts, etc.).\nResource saturation (e.g. CPU, memory, disk space, etc.).\nFailed deployments."},{key:"examplesOfAlertConsiderations",category:"example",text:"Examples of alert considerations:\nSet suitable thresholds within suitable timeframes to avoid alert fatigue.\nDecide how best to notify the team.\nEnsure sufficient information is included in alerts.\nEnsure alerts are actionable.\nDecide on which environments to configure alerts in (other than the live system)."},{key:"swiftIdentificationOfRootCause",category:"principle",text:"Enable swift diagnosis of an issue's root cause"},{key:"makeLiveLogsAccessible",category:"action",text:"Make live logs easily accessible"},{key:"examplesOfLogEntries",category:"example",text:"Examples of log entries:\nUser ID, request ID, etc.\nHTTP method, URI / URL, HTTP status code.\nError messages and stack traces for exceptions.\nCorrelation / trace IDs with relevant information to track requests across services."},{key:"deployFixToLiveAsSoonAsPossible",category:"principle",text:"Once a fix for an issue has been developed and tested, deploy it to the live system as soon as possible"},{key:"streamlineDeploymentOfFixes",category:"action",text:"Configure the CI pipeline to streamline the deployment of fixes to the live system by automating steps (ensuring that all checks and tests pass)"},{key:"learnFromIssuesInLiveSystem",category:"principle",text:"Learn from issues in the live system"},{key:"postmortems",category:"action",text:"Set up postmortems to investigate issues in the live system, and agree on actions to prevent similar issues occurring in the future"},{key:"environments",category:"action",text:"Make available suitable environments for functional and non-functional testing"},{key:"examplesOfEnvironments",category:"example",text:"Examples of environments:\nlocalhost on the CI platform for running tests on PRs / MRs (ephemeral environment).\nDevelopment environment for use by the development team.\nTest / staging / pre-production environment which closely resembles the live environment, to run performance tests - and for use by the wider team prior to release."},{key:"evaluateTools",category:"action",text:"Evaluate tools to run checks and tests"},{key:"examplesOfToolsToEvaluate",category:"example",text:"Examples of tools to evaluate:\nStatic code analysis tools (to check formatting, style / linting, security, etc.).\nUnit / integration test frameworks.\nMocking frameworks for unit / integration tests.\nHTTP client for API testing.\nAutomated UI testing tools.\nAccessibility testing tools (whether or not integrated into e.g. a UI testing tool).\nLocalisation and internationalisation testing tools (whether or not integrated into e.g. a UI testing tool).\nPerformance / load testing tools.\nSecurity testing tools."},{key:"examplesOfEvaluationCriteria",category:"example",text:"Examples of evaluation criteria:\nLicensing cost.\nEase of use and maintenance.\nEase of integration with the CI pipeline.\nReporting and analytics.\nSupport available.\nTesting tools: programming languages supported.\nTesting tools: ease of debugging.\nUI testing tools: speed of execution.\nUI testing tools: robustness / flakiness.\nUI testing tools: support for cross-browser / cross-platform testing."},{key:"optimiseCode",category:"principle",text:"Optimise code"},{key:"optimiseProductionCode",category:"principle",text:"Optimise production code"},{key:"makeProductionCodeTestable",category:"principle",text:"Make production code testable"},{key:"examplesOfWaysToMakeCodeTestable",category:"example",text:"Examples of ways to make code testable:\nWhere applicable, write less code by creating reusable functions / components / etc., which can be tested independently (e.g. UI components).\nOnly place presentation logic in the UI layer.\nOnly place business logic in the business logic layer (avoid placing business logic in the UI / presentation layer or database).\nWrite code that is easy to understand and maintain (following SOLID principles, and using standard libraries where possible and universal language for naming, and enforcing consistent syntax / formatting, etc.).\nMake use of dependency injection to enable mocking.\nInclude return values in methods / functions.\nUI / user journey tests: include test IDs in the UI to make it easier to identify and interact with elements in tests."},{key:"suitableLogging",category:"action",text:"Implement suitable logging (making sure not to log sensitive data)"},{key:"examplesOfLogEntries2",category:"example",text:"Examples of log entries:\nUser ID, request ID, etc.\nHTTP method, URI / URL, HTTP status code.\nError messages and stack traces for exceptions.\nCorrelation / trace IDs with relevant information to track requests across services."},{key:"optimiseTestCode",category:"principle",text:"Optimise test code"},{key:"repeatableTests",category:"principle",text:"Make relevant tests easily repeatable"},{key:"automatedTests",category:"principle",text:"Create automated tests for those checks which are easily automated"},{key:"manualTests",category:"principle",text:"As a general rule, reserve manual / exploratory testing only for checks which are not easily automated, e.g. UX"},{key:"makeTestsMaintainable",category:"principle",text:"Ensure tests are easy to read and maintain by the whole team"},{key:"testsInSameRepo",category:"action",text:"Write tests in the same source-code repository as the corresponding production code (i.e. collocate tests)"},{key:"avoidConflictsBetweenTestsAndProductionCode",category:"principle",text:"Avoid functional tests failing due to changes to production code but not to test code, and vice versa"},{key:"sameBranchForTests",category:"action",text:"Push production code and corresponding functional test code on the same temporary branch"},{key:"testsInSameLanguage",category:"action",text:"Generally, write the test code in the same programming language as the production code (there may be exceptions to this, e.g. if a selected testing tool requires a different language)"},{key:"avoidDuplicationAndDivergenceInTests",category:"principle",text:"Avoid duplication and divergence in the test code"},{key:"reuseProductionCodeInTests",category:"action",text:"In the test code, reuse relevant items from the production code, e.g. data models, enums, utility functions, etc."},{key:"sameCodingStandardsInTests",category:"action",text:"Apply the same coding standards to the test code as the production code, by applying the same formatting and linting rules, etc."},{key:"suitableAutomatedTests",category:"principle",text:"Write suitable automated tests"},{key:"optimiseFunctionalTests",category:"principle",text:"Optimise functional tests",linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"failureIsolation",category:"principle",text:"When a functional defect occurs, it should cause as few test failures as possible (failure isolation)"},{key:"keepNumberOfTestsToMinimum",category:"principle",text:"While ensuring good coverage, keep the number of functional tests to a minimum (to reduce maintenance costs)"},{key:"keepTestExecutionTimeToMinimum",category:"principle",text:"Keep functional test execution time to a minimum (to make releases to live as quick as possible)"},{key:"rightBalanceOfFunctionalTests",category:"principle",text:"Get the right balance between different types of functional test (per the testing pyramid / trophy / honeycomb / diamond)"},{key:"granularTests",category:"principle",text:"Focus most effort on more granular, low-level functional tests, which are cheaper to write and maintain than higher-level tests, and take less time to run"},{key:"unitAndIntegrationTests",category:"action",text:"Write plenty of unit / component tests and integration tests, covering positive and negative scenarios, edge cases, error / exception handling, etc."},{key:"testCoverageThresholds",category:"action",text:"Set a high test-coverage threshold for unit and integration tests (e.g. 90% or higher) and fail the build if the threshold is not met (exclude from the analysis code which is not practical to test)"},{key:"avoidMeaninglessTests",category:"principle",text:"BUT avoid writing meaningless functional tests just to increase code coverage stats"},{key:"fewerHighLevelTests",category:"principle",text:"Write fewer high-level functional tests"},{key:"highRiskAndPositiveScenarios",category:"action",text:"Focus high-level functional tests on key high-risk and positive scenarios"},{key:"examplesOfHighRiskScenarios",category:"example",text:"Examples of high-risk functional scenarios:\nCustomer makes a payment.\nOrganisation pays a supplier.\nRegulatory requirements are met.\nScenarios which harm reputation if they fail."},{key:"examplesOfHighLevelTests",category:"example",text:"Examples of high-level functional tests:\nSee API test and user journey tests in the functional test matrix."},{key:"runAllChecksAndTestsWithinSuiteInParallel",category:"action",text:"If possible, configure all the checks and tests within each suite so that they can be run in parallel (via the CI pipeline)"},{key:"useSuitableTestDataForFunctionalTests",category:"principle",text:"Use suitable data for functional tests"},{key:"examplesOfFunctionalTestData",category:"example",text:'Examples of functional test data:\nData which covers different logic paths and scenarios.\nData which is at the boundaries of what is valid.\nData in latest formats and legacy formats (e.g. to apply an update on a newly created account and on an "old-style" account).\nData with different characteristics (e.g. small and large files, etc.).\nData which is typical of what is seen in production (maybe even non-sensitive data from the live system, or scrambled live data).'},{key:"checkLiveSystemIsUpAndRunning",category:"principle",text:"Check that the live system is up and running"},{key:"liveTests",category:"action",text:"Write functional tests to run in the live system - these may be configured separately from other functional tests and be read-only"},{key:"examplesOfFunctionalTestingTechniques",category:"example",text:"Examples of functional testing approaches / techniques:\nBearing in mind tests are a good way to document system behaviour, formulate tests in a way which is easily understandable (whether or not you decide to use BDD / Cucumber).\nHappy path testing to cover the most common scenarios.\nBoundary value analysis (if a value of 5 is valid and 6 is invalid, check with 5 and 6 and one either side, i.e. 4 and 7).\nUsing different combinations of input parameters."},{key:"optimiseNonFunctionalTests",category:"principle",text:"Optimise non-functional tests"},{key:"optimisePerformanceTests",category:"principle",text:"Optimise performance / load tests"},{key:"ensureSystemPerformsWellUnderLoad",category:"principle",text:"Ensure the system performs well under normal and peak loads"},{key:"documentBenchmarkRequestRates",category:"action",text:"For each type of request, document expected requests per minute under normal and peak loads, together with categories of data used in requests and maximum acceptable response times (e.g. at 95th percentile), to use as benchmarks"},{key:"applyUpliftToBenchmarkRequestRates",category:"principle",text:"To be on the safe side, apply an uplift / increase of e.g. 30% to the benchmark request rates"},{key:"focusOnHighRiskPerformanceIssues",category:"principle",text:"Focus initial effort on aspects of performance deemed to be high-risk"},{key:"writePerformanceTests",category:"action",text:"Write performance tests for APIs / back-end services, using the uplifted request rates for peak load, and ensuring that large data sets and data sets which involve intensive processing are included. (While UIs can have serious performance issues, they may be considered less risky than API / back-end services from a performance perspective - because they tend to contain presentation logic rather than more intensive business logic, and UI performance issues tend to be easier to notice.)"},{key:"runPerformanceTests",category:"action",text:"Run the performance tests in the live-like environment, making sure no other activities are running in the environment (so performance test results are not distorted)"},{key:"reviewPerformanceTestResults",category:"action",text:"Review the results of the performance tests, paying particular attention to errors / exceptions, response times and resource usage (e.g. CPU and memory), and investigate and fix any issues found"},{key:"regularlyReviewAndUpdateBenchmarks",category:"action",text:"Regularly review and update performance benchmarks as the system and its usage evolve"},{key:"examplesOfNonFunctionalTests",category:"example",text:"Examples of other non-functional tests:\nAccessibility tests.\nLocalisation and internationalisation tests.\nSecurity tests (static analysis checks running on PRs / MRs, externally organised penetration tests, etc.).\nRecovery / failover / backup & restore tests."},{key:"failFast",category:"principle",text:"Identify issues early in the development cycle, so they are cheaper to fix (fail fast)"},{key:"reviewRequirements",category:"action",text:"Review requirements and designs (UI, content, architecture, technical approach, etc.) before development starts (e.g. during refinement / 3 amigos sessions)"},{key:"examplesOfActivitiesWhenReviewingRequirements",category:"example",text:"Examples of activities when reviewing requirements:\nCorrect errors in requirements and designs.\nCorrect omissions in requirements and designs.\nAdd key, high-risk test scenarios to requirements, expressed in functional / business language, e.g. in Gherkin format (Given, When, Then) or in a truth table.\nConfirm whether special consideration is needed for legacy data (as opposed to newly created data).\nEnsure any non-functional requirements are noted (e.g. compliance, accessibility, localisation, internationalisation, performance, security, etc.).\nNote any potential environmental config which may need to be added or updated (in particular so it's not missing from the live system when the feature is deployed to live).\nConfirm whether a particular deployment strategy is needed (e.g. does a back-end service need to be deployed before a front end?).\nConfirm whether exposure to a new requirement / feature may need to be controlled, e.g. via a feature flag, canary release or A/B testing.\nIdentify any technical debt that can be addressed at the same time as fulfilling a new requirement."},{key:"runTestsEarly",category:"principle",text:"Run checks / tests as early as possible in the development cycle for quick feedback"},{key:"ensureChecksAndTestsRunQuickly",category:"principle",text:"Ensure checks and tests run as quickly as possible to allow quick releases (if there are no test failures)"},{key:"examplesOfWaysToEnsureChecksAndTestsRunsQuickly",category:"example",text:"Examples of ways to ensure checks and tests runs quickly:\nRun checks / tests at the right stages of the CI pipeline - e.g. don't run unit tests after deployment to a dev / test environment when they've already run and passed on a PR / MR.\nRun different suites of checks / tests in parallel, rather than sequentially on the CI pipeline.\nRun tests / checks within each suite in parallel, rather than sequentially on the CI pipeline."},{key:"protectPermanentBranchesAndEnvironments",category:"principle",text:"Protect permanent branches, and environments"},{key:"runChecksAndTestsBeforeDeployment",category:"principle",text:"Run checks / tests before code is merged into a permanent branch and deployed to the first dev / test environment"},{key:"runChecksAndTestsOnPRs",category:"action",text:"Configure the CI pipeline to automatically run checks and tests when a PR / MR (on a temporary branch) is raised / updated"},{key:"examplesOfChecksAndTestsOnPRs",category:"example",text:"Examples of checks and tests to run on PRs / MRs:\nCode compiles successfully.\nCode is formatted correctly.\nCode conforms to style guidelines (linting).\nSecurity checks pass.\nUnit tests pass.\nIntegration tests pass.\nHigh-level functional tests pass."},{key:"deployAfterMergingPR",category:"action",text:"Once a PR / MR has passed all checks and tests, and passed review, configure the CI pipeline to automatically deploy to the first dev / test environment"},{key:"reviewPRs",category:"action",text:"Enforce review and approval of PRs / MRs before merging"},{key:"checkForEnvironmentalIssues",category:"principle",text:"Check for environmental issues"},{key:"smokeTestsOnEnvironments",category:"action",text:"Immediately after deployment to an environment, configure the CI pipeline to automatically run a subset of key functional / smoke tests"},{key:"examplesOfEnvironmentalIssues",category:"example",text:"Examples of environmental issues (which may highlight issues in the live system too):\nMissing or incorrect configuration entries.\nNetwork connectivity issues.\nInsufficient system resources (e.g. memory, disk space)."},{key:"failBuildOnFailedChecksAndTests",category:"action",text:"Configure the CI pipeline to automatically fail the build if any checks or tests fail, such that merging / deployment is blocked until they are fixed"},{key:"notifyTeamOnFailedBuilds",category:"action",text:"Notify the team immediately when a build fails, so issues can be fixed as soon as possible"}],rawLinks=[{from:"title",to:"overallAim"},{from:"overallAim",to:"addValue"},{from:"overallAim",to:"stopIssues"},{from:"addValue",to:"costEffective"},{from:"stopIssues",to:"costEffective"},{from:"stopIssues",to:"examplesOfIssues",dashed:!0},{from:"costEffective",to:"mitigateMostRisk"},{from:"mitigateMostRisk",to:"optimiseArchitectureAndInfrastructure"},{from:"optimiseArchitectureAndInfrastructure",to:"mitigateRisksInLiveSystem"},{from:"mitigateRisksInLiveSystem",to:"optimiseAvailability"},{from:"optimiseAvailability",to:"examplesOfWaysToOptimiseAvailabilityCapacityAndTrafficManagement
