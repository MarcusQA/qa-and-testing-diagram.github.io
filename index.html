<!doctype html><html><head><meta charset="UTF-8"><title>QA and testing in software development</title><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><link rel="icon" type="image/png" href="favicon.ico"><link rel="stylesheet" href="https://unpkg.com/reactflow/dist/style.css"><script src="https://unpkg.com/reactflow/dist/umd/index.js"></script><script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script><style>body{font-family:Arial;margin:0;padding:16px;background:#fafafa}#root{min-height:95vh}.layout{display:flex;gap:10px}.diagram{flex:1;border:1px solid #999;background:#fff;height:100%}.sidebar{width:320px;display:grid;grid-template-rows:repeat(3,1fr);gap:10px;height:100%}.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;min-height:0;display:flex;flex-direction:column}.card ul{list-style:none;padding:0;margin:0;overflow:auto;flex:1;min-height:0}.card li{font-size:12px;padding:3px 0;cursor:pointer}</style></head><body><div id="root"></div><script>const{useState:useState,useMemo:useMemo,useCallback:useCallback,useRef:useRef,useEffect:useEffect}=React,RF=window.ReactFlow,{ReactFlow:ReactFlow,Background:Background,Controls:Controls,MiniMap:MiniMap,Handle:Handle,Position:Position,MarkerType:MarkerType}=RF,FUNCTIONAL_TEST_MATRIX_URL="https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing",rawNodes=[{key:"title",category:"text",text:"High-level aim"},{key:"overallAim",category:"text",text:"Two sides of the same coin:"},{key:"addValue",category:"coin",text:"Ensure releases to the live system add value"},{key:"minimiseLikelihoodOfIssues",category:"coin",text:"Minimise the likelihood of issues occurring in the live system"},{key:"examplesOfIssues",category:"example",text:"Examples of issues:\nCustomers can no longer buy products.\nSystem crashes when there are many simultaneous users (i.e. under high load).\nSystem exposes sensitive data to unauthorised parties.\nEntire system goes down."},{key:"costEffective",category:"principle",text:"Work in the most cost-effective way"},{key:"optimiseTeamDynamicsAndWorkingPractices",category:"principle",text:"Optimise team dynamics and working practices"},{key:"areaTeamConsiderations",category:"area",text:"Team considerations",anchorKey:"optimiseTeamDynamicsAndWorkingPractices"},{key:"aimToBakeInQualityAndTesting",category:"principle",text:"Build quality into development, with developers owning quality outcomes and any QA specialists enabling the team"},{key:"useEngineeringPracticesThatMakeQualityPartOfEveryChange",category:"principle",text:"Use engineering practices that make quality part of every change"},{key:"examplesOfEngineeringPracticesThatMakeQualityPartOfEveryChange",category:"example",text:"Examples of engineering practices that build quality into development:\nAgree expected behaviour before coding, e.g. during refinement / 3 amigos and, where useful, using BDD scenarios or TDD.\nRun relevant checks and tests early and often.\nPrefer fast, precise feedback from unit / component and integration tests, with fewer slow high-level tests.\nBuild relevant logging, monitoring / observability and non-functional considerations into each change.\nUse any QA specialists to coach on risk, test strategy and process improvement, rather than as the final safety net."},{key:"reachOptimalDecisions",category:"principle",text:"Reach optimal decisions"},{key:"avoidRedundantWork",category:"principle",text:"Avoid redundant work, duplicated effort and unnecessary rework"},{key:"avoidWorkBeingBlockedByExpertUnavailability",category:"principle",text:'Avoid work being blocked by one "expert" not being available'},{key:"ensureCommunicationAndCollaboration",category:"principle",text:"Ensure constant communication, collaboration and sharing of information between members of the development team and the wider team"},{key:"examplesOfWaysToEnsureCommunicationAndCollaboration",category:"example",text:"Examples of ways to ensure communication and collaboration:\nAgree lightweight team working practices.\nUse shared definitions of ready and done.\nInclude QA & testing within the definition of done.\nImplement workflows which promote collaboration (e.g. if the development team consists of QA specialists, create one shared column on a Scrum / Kanban board for both development and testing).\nDaily stand-ups.\nRegular refinement / 3 amigos sessions.\nPair / mob programming (including between developers and QA specialists).\nRegular code reviews.\nRegular reviews of work with key stakeholders.\nRegular retrospective sessions to identify problems in working practices and opportunities for improvement."},{key:"prioritiseEffortAccordingToRiskAndValue",category:"principle",text:"Prioritise effort according to risk and value"},{key:"ensureKeyInformationIsEasilyAccessible",category:"principle",text:"Ensure key project information is easily accessible"},{key:"keepDocumentationLightweightUsefulAndProportionate",category:"principle",text:"Keep documentation lightweight, useful and proportionate"},{key:"areaDocumentation",category:"area",text:"Documentation",anchorKey:"keepDocumentationLightweightUsefulAndProportionate"},{key:"captureInformationNeededToBuildTestReleaseAndSupportChanges",category:"principle",text:"Capture the information needed to build, test, release and support changes"},{key:"conciselyDocumentDefinitionsOfReadyAndDone",category:"principle",text:"Concisely document definitions of ready and done"},{key:"examplesOfItemsToIncludeInDefinitionOfReady",category:"example",text:"Examples of items to consider in definition of ready:\nThe requirement is necessary and provides value.\nThe work item (e.g. Jira ticket) is small enough to deliver safely.\nIt's clear what is in scope and what is out of scope.\nAcceptance criteria are clear and testable, with key high-risk scenarios captured in functional / business language, e.g. in Gherkin format or in a truth table.\nRelevant non-functional requirements are noted, e.g. compliance, accessibility, localisation, internationalisation, performance and security.\nImportant UI, content, architecture and technical approach questions have been reviewed.\nRelevant data considerations are noted, including handling of legacy data where applicable.\nRelevant environmental configuration is identified.\nDependencies, assumptions, risks and unknowns are captured.\nAny required deployment strategy is understood.\nAny need for controlled exposure, e.g. feature flags, canary release or A/B testing, is identified.\nAny relevant technical debt that can be addressed as part of the work is identified."},{key:"examplesOfItemsToIncludeInDefinitionOfDone",category:"example",text:"Examples of items to consider in definition of done:\nAcceptance criteria are met.\nRequired automated tests have been added or updated.\nRelevant manual / exploratory checks have been completed.\nCode has been reviewed and approved.\nRequired checks and tests pass in CI.\nRelevant documentation has been updated.\nRelevant monitoring, logging or alerting has been considered.\nSecurity, privacy, accessibility and performance considerations have been addressed where relevant.\nRelease / deployment notes have been added where needed.\nThe change is ready to deploy or has been deployed to the relevant environment."},{key:"keepReadmeUsefulAndUpToDate",category:"principle",text:"Keep READMEs useful and up to date"},{key:"examplesOfItemsToIncludeInREADMEs",category:"example",text:"Examples of items to include in READMEs:\nProject overview.\nTechnology stack.\nPrerequisites.\nLocal set-up.\nConfiguration and environment variables.\nRunning the application.\nDatabase set-up.\nRunning tests.\nCode quality checks.\nBuild instructions.\nCI / CD summary.\nProject structure.\nBranching and contribution workflow.\nCoding conventions.\nSource-control conventions.\nTroubleshooting.\nUseful commands.\nLinks to related documentation.\nOwnership and support."},{key:"includeRelevantInformationInWorkItems",category:"principle",text:"Include relevant information in work items (e.g. Jira tickets)"},{key:"examplesOfItemsToIncludeInWorkItems",category:"example",text:"Examples of useful information to include in work items:\nTitle.\nSummary.\nBackground / context.\nBusiness value / user benefit.\nScope and out of scope.\nRequirements.\nAcceptance criteria.\nDesign / UX / user research notes.\nTechnical notes.\nDependencies, assumptions, risks and unknowns.\nTest considerations.\nData / migration considerations.\nSecurity / privacy considerations.\nPerformance considerations.\nObservability / logging considerations.\nDocumentation updates.\nRelease / deployment notes."},{key:"createBugTicketsOnlyForDefectsOutsideCurrentDevelopmentFocus",category:"principle",text:"Create bug tickets only for defects outside the current development focus"},{key:"examplesOfItemsToIncludeInBugTickets",category:"example",text:"Examples of items to include in bug tickets:\nTitle.\nSummary.\nEnvironment found in, including platform / browser / device / operating system where relevant.\nApplication version / build / commit.\nPreconditions / test data used.\nSteps to reproduce.\nExpected behaviour.\nActual behaviour.\nScreenshots, screen recordings, logs or error messages.\nSeverity / priority.\nImpact on users or the business.\nLinks to related work items (e.g. Jira tickets), PRs / MRs, incidents, test cases, documentation or monitoring / alerting dashboards."},{key:"optimiseArchitectureAndInfrastructure",category:"principle",text:"Optimise architecture & infrastructure"},{key:"mitigateRisksInLiveSystem",category:"principle",text:"Mitigate risk in the live system"},{key:"optimiseAvailability",category:"principle",text:"Optimise availability of the live system"},{key:"examplesOfWaysToOptimiseAvailabilityCapacityAndTrafficManagement",category:"example",text:"Examples of ways to optimise availability - capacity and traffic management:\nUse a CDN to serve static assets.\nConfigure auto-horizontal scaling.\nImplement load shedding for overload conditions."},{key:"examplesOfWaysToOptimiseAvailabilityHighAvailabilityArchitecture",category:"example",text:"Examples of ways to optimise availability - high availability architecture:\nUse a multi-region deployment strategy.\nEliminate single points of failure through redundancy (no single points of failure).\nEnsure automatic failover between instances / services.\nUse database replication / clustering with automatic failover where appropriate."},{key:"examplesOfWaysToOptimiseAvailabilityServiceResilience",category:"example",text:"Examples of ways to optimise availability - service resilience:\nSet up health checks and automatic restarts.\nIntroduce timeout funnels for inter-service requests.\nUse circuit breakers for failing dependencies.\nConfigure retries with exponential backoff for transient failures."},{key:"examplesOfWaysToOptimiseAvailabilityRecoveryAndDataProtection",category:"example",text:"Examples of ways to optimise availability - recovery and data protection:\nEnsure the system can recover correctly after outages.\nProvide backup, restore and point-in-time recovery mechanisms that maintain data integrity."},{key:"rollOutFeatures",category:"principle",text:"Introduce mechanisms to roll out new features in a controlled manner (progressive delivery)"},{key:"examplesOfWaysToRollOutFeatures",category:"example",text:"Examples of mechanisms to roll out features in a controlled manner:\nFeature flags to quickly roll back features if necessary.\nCanary releases to gradually expose features to users and gain feedback on how the features perform before rolling them out widely.\nA/B testing to present different versions to users and gain feedback."},{key:"easyDeploymentOfIsolatedFixes",category:"principle",text:"Ensure code is split in a way which allows easy deployment of an isolated fix or change"},{key:"independentlyDeployableMicroservices",category:"action",text:"Consider setting up independently deployable microservices (either in a monorepo or in multiple distinct repos)"},{key:"minimiseTimeToDetectAndResolveIssues",category:"principle",text:"Minimise the time to detect and fix issues in the live system"},{key:"makeTeamAwareOfLiveIssues",category:"principle",text:"Make the team aware as soon as an issue occurs in the live system"},{key:"configureMetrics",category:"action",text:"Configure metrics to monitor the live system, and set up dashboards to make the metrics easily accessible to the team"},{key:"areaMonitoringAndAlerting",category:"area",text:"Monitoring & alerting",anchorKey:"configureMetrics"},{key:"examplesOfMetrics",category:"example",text:"Examples of metrics to configure:\nHTTP 5xx errors.\nErrors and exceptions logged by the application.\nPerformance degradation (e.g. increased response times, timeouts, etc.).\nResource saturation (e.g. CPU, memory, disk space, etc.).\nFailed deployments."},{key:"configureAlerts",category:"action",text:"Configure alerts based on metrics"},{key:"checkLiveSystemIsUpAndRunning",category:"principle",text:"Independently check that the live system is up and running"},{key:"syntheticTests",category:"action",text:"Create and execute live synthetic tests - see the functional test matrix for more details",linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"alertOnSyntheticTestFailure",category:"action",text:"Trigger an alert if a synthetic test fails or fails to run (assuming synthetic tests are triggered by infrastructure monitoring tools, rather than as part of functional tests via CI)"},{key:"examplesOfAlertConsiderations",category:"example",text:"Examples of alert considerations:\nSet suitable thresholds within suitable timeframes to avoid alert fatigue.\nDecide how best to notify the team (e.g. email, Slack / Teams, mobile app, etc.).\nEnsure sufficient information is included in alerts.\nEnsure alerts are actionable.\nDecide on which environments to configure alerts in, other than the live system; if you do configure alerts for other environments, ensure the environment name is included in the alert."},{key:"enableSwiftDiagnosisOfLiveIssues",category:"principle",text:"Enable swift diagnosis of live issues"},{key:"makeLiveLogsAccessible",category:"action",text:"Make live logs easily accessible"},{key:"deployFixToLiveAsSoonAsPossible",category:"principle",text:"Once a fix for a live issue has been developed and tested, deploy it to the live system as soon as possible"},{key:"streamlineDeploymentOfFixes",category:"action",text:"Configure the CI pipeline to streamline the deployment of fixes to the live system by automating steps (ensuring that all relevant checks and tests pass)"},{key:"learnFromIssuesInLiveSystem",category:"principle",text:"Learn from issues in the live system"},{key:"postmortems",category:"action",text:"Set up postmortems to investigate issues in the live system, and agree on actions to prevent similar issues occurring in the future"},{key:"environments",category:"action",text:"Make available suitable environments for functional and non-functional testing"},{key:"areaEnvironments",category:"area",text:"Environments",anchorKey:"environments"},{key:"examplesOfEnvironments",category:"example",text:"Examples of environments:\nlocalhost on the CI platform for running tests on PRs / MRs (ephemeral environment).\nDevelopment environment for use by the development team.\nTest / staging / pre-production environment which closely resembles the live environment, to run performance tests - and for use by the wider team prior to release."},{key:"identifyIssuesCheaplyBeforeCodeWritten",category:"principle",text:"Identify issues cheaply before a line of code is written (fail fast)"},{key:"reviewWorkItemsBeforeDevelopmentStarts",category:"action",text:"Review work items (e.g. Jira tickets) against the definition of ready before development starts (e.g. during refinement / 3 amigos sessions)"},{key:"areaWorkItemReadiness",category:"area",text:"Work-item readiness",anchorKey:"reviewWorkItemsBeforeDevelopmentStarts"},{key:"examplesOfActivitiesWhenReviewingWorkItems",category:"example",text:"Examples of activities when reviewing work items:\nCompare each work item against the definition of ready.\nCorrect errors, contradictions and ambiguities.\nIdentify and fill important gaps before development starts.\nSplit work items that are too large or risky to deliver safely.\nConfirm that the team understands what needs to be built, tested and released."},{key:"useRiskBasedTestStrategy",category:"principle",text:"Use a risk-based test strategy"},{key:"designProductionCodeToSupportTestingAndDiagnosis",category:"principle",text:"Design production code to support testing and diagnosis"},{key:"makeProductionCodeTestable",category:"principle",text:"Make production code testable"},{key:"areaTestability",category:"area",text:"Testability",anchorKey:"makeProductionCodeTestable"},{key:"examplesOfWaysToMakeCodeTestable",category:"example",text:"Examples of ways to make code testable:\nWhere applicable, write less code by creating reusable functions / components / etc., which can be tested independently (e.g. UI components).\nOnly place presentation logic in the UI layer.\nOnly place business logic in the business logic layer (avoid placing business logic in the UI / presentation layer or database).\nWrite code that is easy to understand and maintain (following SOLID principles, and using standard libraries where possible and universal language for naming, and enforcing consistent syntax / formatting, etc.).\nMake use of dependency injection to enable mocking.\nInclude return values in methods / functions.\nUI / user journey tests: include stable identifiers in the UI (e.g. data-testid for web, and accessibility identifiers for mobile) to make it easier to identify and interact with elements in tests, and avoid brittle / fragile tests."},{key:"allowIssuesOrBehaviourToBeInvestigatedEasily",category:"principle",text:"Allow issues or behaviour to be investigated easily"},{key:"suitableLogging",category:"action",text:"Implement suitable logging (making sure not to log sensitive data)"},{key:"examplesOfLogEntries",category:"example",text:"Examples of log entries:\nUser ID, request ID, etc.\nHTTP method, URI / URL, HTTP status code.\nError messages and stack traces for exceptions.\nCorrelation / trace IDs with relevant information to track requests across services."},{key:"useSuitableToolsForChecksAndTests",category:"principle",text:"Use suitable tools for checks and tests"},{key:"areaTestingTools",category:"area",text:"Tools",anchorKey:"useSuitableToolsForChecksAndTests"},{key:"evaluateTools",category:"action",text:"Evaluate tools to run checks and tests"},{key:"examplesOfToolsToEvaluate",category:"example",text:"Examples of tools to evaluate:\nStatic code analysis tools (to check formatting, style / linting, security, etc.; AI code reviewers).\nUnit / integration test frameworks.\nMocking frameworks for unit / integration tests.\nHTTP client for API testing.\nAutomated UI testing tools.\nAccessibility testing tools (whether or not integrated into e.g. a UI testing tool).\nLocalisation and internationalisation testing tools (whether or not integrated into e.g. a UI testing tool).\nPerformance / load testing tools.\nSecurity testing tools."},{key:"examplesOfEvaluationCriteriaForTools",category:"example",text:"Examples of evaluation criteria for tools (each of which may be weighted according to importance):\nLicensing cost.\nEase of use and maintenance.\nEase of integration with the CI pipeline.\nReporting and analytics.\nSupport available.\nTesting tools: programming languages supported.\nTesting tools: ease of debugging.\nUI testing tools: speed of execution.\nUI testing tools: robustness / flakiness.\nUI testing tools: support for cross-browser / cross-platform testing.\nUI testing tools: support for accessibility checks."},{key:"makeImportantChecksRepeatable",category:"principle",text:"Make important checks repeatable"},{key:"automateChecks",category:"principle",text:"Automate checks that are valuable and practical to automate"},{key:"placeChecksAndTestsWhereTheyGiveFastUsefulFeedback",category:"principle",text:"Place checks and tests where they give fast, useful feedback (shift left)"},{key:"checkSystemWorksCorrectly",category:"principle",text:"Check whether the system works correctly"},{key:"optimiseFunctionalTests",category:"principle",text:"Optimise functional tests",linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"areaFunctionalTests",category:"area",text:"Functional tests",anchorKey:"optimiseFunctionalTests"},{key:"failureIsolation",category:"principle",text:"When a functional defect occurs, it should cause as few test failures as possible (failure isolation)"},{key:"keepNumberOfTestsToMinimum",category:"principle",text:"While ensuring good coverage, keep the number of functional tests to a minimum (to reduce maintenance costs)"},{key:"rightBalanceOfFunctionalTests",category:"principle",text:"Get the right balance between different types of functional test (per the testing pyramid / trophy / honeycomb / diamond)"},{key:"granularTests",category:"principle",text:"Focus most effort on more granular, low-level functional tests, which are cheaper to write and maintain than higher-level tests, and take less time to run"},{key:"unitAndIntegrationTests",category:"action",text:"Write plenty of unit / component tests and integration tests, covering positive and negative scenarios, edge cases, error / exception handling, etc. (as outlined in the functional test matrix ↗)",linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"testCoverageThresholds",category:"action",text:"Set a high test-coverage threshold for unit and integration tests (e.g. 90% or higher) and fail the build if the threshold is not met (exclude from the analysis code which is not practical to test)"},{key:"avoidMeaninglessTests",category:"principle",text:"BUT avoid writing meaningless functional tests just for the sake of increasing code coverage stats"},{key:"fewerHighLevelTests",category:"principle",text:"Write fewer high-level functional tests"},{key:"examplesOfHighLevelTests",category:"example",text:"Examples of high-level functional tests:\nSee API tests and user journey tests in the functional test matrix.",linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"focusOnPositiveAndHighRiskScenarios",category:"action",text:"Focus high-level functional tests on key positive and high-risk scenarios"},{key:"examplesOfHighRiskScenarios",category:"example",text:"Examples of high-risk functional scenarios:\nCustomer makes a payment.\nOrganisation pays a supplier.\nRegulatory requirements are met.\nScenarios which harm reputation if they fail."},{key:"useSuitableTestDataForFunctionalTests",category:"principle",text:"Use suitable data for functional tests"},{key:"areaFunctionalTestData",category:"area",text:"Functional test data",anchorKey:"useSuitableTestDataForFunctionalTests"},{key:"examplesOfFunctionalTestData",category:"example",text:'Examples of functional test data (see also the "Test data strategy" column for specific types of test in the functional test matrix ↗):\nData which covers different logic paths and scenarios.\nData which is at the boundaries of what is valid.\nAccented or foreign-language characters.\nData in latest formats and legacy formats (e.g. to apply an update on a newly created account and on an "old-style" account).\nSmall and large files.\nData which is typical of what is seen in production (maybe even non-sensitive data from the live system, or scrambled live data).\nNote: ensure there\'s no conflict between data created or used by different tests, particularly when running high-level tests in parallel - where relevant, create new data for each test to avoid unexpected errors.',linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"useSuitableApproachesForFunctionalTests",category:"principle",text:"Use suitable approaches / techniques for functional tests"},{key:"examplesOfFunctionalTestingTechniques",category:"example",text:'Examples of functional testing approaches / techniques (see also the "Useful techniques" column for specific types of test in the functional test matrix ↗):\nFormulate tests in a way which is easy to understand so they double up as documentation of the system\'s behaviour (whether or not you decide to use behaviour-driven development / BDD).\nHappy path testing to cover the most common scenarios.\nEquivalence partitioning and boundary value analysis (if an input value of 5 is valid and 6 is invalid, check with 5 and 6 and one either side, i.e. 4 and 7).\nUsing different combinations of input parameters.\nIn free-text, string fields in the UI or in HTTP requests reference the name of the field, and the name of the test or the type of test, so it\'s easy to identify records created by automated tests in environments where there may be multiple other users (e.g. "FirstNameAPITest", "LastNameAPITest", etc.).\nWhere unique string values are required, consider appending a high-precision, human-readable timestamp calculated from the current time  - to help identify data created during a particular test run (e.g. "CompanyName APITest 2026-07-02T071420.780370Z").\nAvoid brittle tests by testing functional behaviour, using deterministic data and waits, keeping assertions meaningful rather than over-specific, and avoiding excessive coupling to implementation details.',linkUrl:"https://docs.google.com/spreadsheets/d/1C3TuH1rFKLQDuaDndh20JJsmjqYk9F2YbACm7Ss54lM/edit?usp=sharing"},{key:"optimiseExecutionOfFunctionalTests",category:"principle",text:"Optimise execution of functional tests"},{key:"simplifyRunningOfTests",category:"principle",text:"Simplify running of tests"},{key:"examplesOfWaysToSimplifyRunningOfTests",category:"example",text:"Examples of ways to simplify running of tests:\nEnsure all tests are self-contained, so they can be run independently - e.g. test A doesn't rely on data created by test B.\nProvide one or more simple commands to run tests (e.g. in particular, commands are necessary for running the tests via the CI pipeline).\nProvide a simple command for running all tests.\nProvide a simple command to run a single test or a subset of tests.\nDepending on the code editor, ensure one test, all tests or a subset of tests can be run easily from the UI."},{key:"keepTestExecutionTimeToMinimum",category:"principle",text:"Keep functional test execution time to a minimum (to make releases to live as quick as possible)"},{key:"examplesOfWaysToKeepTestExecutionTimeToMinimum",category:"example",text:"Examples of ways to keep test execution time to a minimum:\nAvoid using fixed sleeps in the test code to block execution; instead, wait until the required condition or state is ready, then continue as soon as it is (this particularly applies to user journey tests and message / event integration tests).\nIf possible, configure all the checks and tests within each suite so that they can be run in parallel (via the CI pipeline)."},{key:"checkHowWellSystemWorks",category:"principle",text:"Check how well the system works"},{key:"optimiseNonFunctionalTests",category:"principle",text:"Optimise non-functional tests"},{key:"areaNonFunctionalTests",category:"area",text:"Non-functional tests",anchorKey:"optimiseNonFunctionalTests"},{key:"optimisePerformanceTests",category:"principle",text:"Optimise performance / load tests"},{key:"areaPerformanceTests",category:"area",text:"Performance tests",anchorKey:"optimisePerformanceTests"},{key:"ensureSystemPerformsWellUnderLoad",category:"principle",text:"Ensure the system performs well under normal and peak loads"},{key:"definePerformanceExpectationsForHighRiskRequestsAndOperations",category:"action",text:"Define performance expectations for high-risk requests and operations"},{key:"examplesOfPerformanceExpectationsToDefine",category:"example",text:"Examples of performance expectations to define:\nExpected throughput under normal and peak load.\nExpected data volumes and categories of data used in requests.\nMaximum acceptable response times, e.g. at 95th and 99th percentile.\nA suitable safety margin / uplift on request rates where appropriate.\nHow benchmarks will be reviewed and updated as usage changes."},{key:"testPerformanceAtDifferentLevels",category:"principle",text:"Test performance at different levels to get both early feedback and realistic end-to-end confidence"},{key:"singleServicePerformanceTests",category:"action",text:"Write fast, stable single-service performance tests to catch obvious performance regressions early"},{key:"examplesOfSingleServicePerformanceTestConfiguration",category:"example",text:"Examples of configuration of single-service performance test:\nUse mocked or stubbed dependencies where appropriate.\nCover high-risk APIs / back-end services.\nUse realistic test data.\nRun in a container with production-like configuration and fixed resource limits.\nUse short ramp-up, ramp-down and steady-state periods.\nRun when a PR / MR is raised / updated."},{key:"examplesOfSingleServicePerformanceTestAssertions",category:"example",text:"Examples of single-service performance test assertions:\nNo unexpected errors occur under load.\nResponse-time percentiles stay within agreed performance budgets, e.g. at 95th percentile.\nResource usage remains within expected limits."},{key:"fullSystemPerformanceTests",category:"action",text:"Run full-system performance tests over a longer period (e.g. 10 - 20 minutes) in a live-like environment, using realistic dependencies, configuration, infrastructure and data volumes, and making sure no other activities are running in the environment so results are not distorted (to ensure you're testing your application code, you may also need to disable throttling / rate-limiting applied at the infrastructure level)"},{key:"examplesOfWhenToRunFullSystemPerformanceTests",category:"example",text:"Examples of when to run full-system performance tests:\nBefore major releases.\nAfter significant architectural changes.\nOn a scheduled basis."},{key:"reviewPerformanceTestData",category:"action",text:"Review the data from the performance test run, comparing it against data from previous runs"},{key:"examplesOfDataToReviewFromFullSystemPerformanceTests",category:"example",text:"Examples of data to review from a full-system performance test:\nThroughput.\nErrors / exceptions.\nResponse-time percentiles.\nResource usage (e.g. CPU and memory).\nBehaviour of downstream databases and dependencies.\nAutoscaling, load balancing, queues, caching and other infrastructure mechanisms."},{key:"investigateAndFixPerformanceIssuesFound",category:"action",text:"Investigate and fix any performance issues found"},{key:"ensurePerformanceDataRetainedForFutureComparison",category:"action",text:"Ensure data from the performance test run is retained for future comparison, and that the performance benchmarks are updated if necessary"},{key:"examplesOfNonFunctionalTests",category:"example",text:"Examples of other non-functional tests:\nAccessibility tests.\nLocalisation and internationalisation tests.\nSecurity tests (static analysis checks running on PRs / MRs, externally organised penetration tests, etc.).\nRecovery / failover / backup & restore tests."},{key:"manualTests",category:"principle",text:"Reserve manual / exploratory testing for checks that are not valuable or practical to automate"},{key:"manuallyCheckUX",category:"action",text:"Manually check UX, etc."},{key:"makeTestsEffectiveMaintainableAndEasyToDiagnose",category:"principle",text:"Make tests effective, maintainable and easy to diagnose"},{key:"areaTestCodeOptimisation",category:"area",text:"Test code optimisation",anchorKey:"makeTestsEffectiveMaintainableAndEasyToDiagnose"},{key:"makeTestsMaintainable",category:"principle",text:"Ensure tests are easy to read and maintain by the whole team"},{key:"avoidConflictsBetweenTestsAndProductionCode",category:"principle",text:"Avoid tests failing due to changes to production code but not to test code, and vice versa"},{key:"testsInSameRepo",category:"action",text:"Write tests in the same source-code repository as the corresponding production code (i.e. collocate tests)"},{key:"sameBranchForTests",category:"action",text:"Push production code and corresponding test code on the same temporary / feature / bug branch"},{key:"keepCodeBaseLeanAndConsistent",category:"principle",text:"Keep codebase lean and consistent"},{key:"avoidDuplicationAndDivergenceInTests",category:"principle",text:"Avoid duplication and divergence in the test code"},{key:"sameCodingStandardsInTests",category:"principle",text:"Apply the same coding standards to the test code as the production code, by applying the same formatting and linting rules, using the same mechanism to manage secrets, etc."},{key:"testsInSameLanguage",category:"action",text:"Generally, write the test code in the same programming language as the production code (there may be exceptions to this, e.g. if a selected testing tool requires a different language)"},{key:"reuseProductionCodeInTests",category:"action",text:"In the test code, reuse relevant items from the production code, e.g. data models, enums, utility functions, etc."},{key:"identifyRootCauseOfFailure",category:"principle",text:"When a test fails, ensure the root cause can be identified quickly and easily"},{key:"examplesOfFailureIdentification",category:"example",text:"Examples of ways to help identify failures:\nTest reports include detailed error messages and logs.\nLogs for services under test are easily accessible (in particular, when running black-box tests via CI against an ephemeral environment, you can upload service logs as artifacts).\nUI / user journey tests: reports include screenshots or video recordings (in particular, you can include a screenshot where the issue occurs PLUS the screen before, for context).\nTest code is easy to debug."},{key:"runChecksAndTestsEarlyInDevelopmentCycle",category:"principle",text:"Run checks and tests as early as possible, so issues are highlighted early and they are cheaper to fix (fail fast)"},{key:"ensureCodePushedToCIPipelineIsOfSuitableQuality",category:"principle",text:"Ensure code pushed to the CI pipeline is of a suitable quality"},{key:"maintainHealthyCodebase",category:"principle",text:"Maintain a healthy codebase"},{key:"areaCodeHygiene",category:"area",text:"Code hygiene",anchorKey:"maintainHealthyCodebase"},{key:"examplesOfWaysToMaintainHealthyCodebase",category:"example",text:"Examples of ways to maintain a healthy codebase:\nKeep compiler, build, linting and static-analysis warnings to a minimum.\nIncrease test coverage thresholds where applicable.\nDecrease warning thresholds where applicable.\nRegularly update libraries, frameworks and build tools (in particular to patch security vulnerabilities).\nMonitor and fix other known dependency vulnerabilities.\nRemove / decommission unused dependencies, dead code and obsolete configuration."},{key:"setUpPreCommitHooks",category:"action",text:"Set up pre-commit hooks to run checks and tests on dev machines - before code reaches the CI pipeline and before code is committed to a temporary / feature / bug branch (some teams may want to do this, but others may not)"},{key:"examplesOfChecksAndTestsOnPreCommitHooks",category:"example",text:"Examples of lightweight checks and tests to run on pre-commit hooks:\nCode compiles / builds successfully.\nCode is formatted correctly.\nCode conforms to style guidelines (linting).\nSecurity checks pass.\nUnit tests pass.\nIntegration tests pass.\nCode coverage thresholds are met.\nBranch name is in the correct format.\nCommit message is in the correct format."},{key:"optimiseCIPipeline",category:"principle",text:"Optimise the CI pipeline"},{key:"areaContinuousIntegration",category:"area",text:"Continuous integration (CI)",anchorKey:"optimiseCIPipeline"},{key:"ensureChecksAndTestsRunQuickly",category:"principle",text:"Ensure checks and tests run as quickly as possible to allow quick releases - if there are no test failures (high velocity)"},{key:"examplesOfWaysToEnsureChecksAndTestsRunsQuickly",category:"example",text:"Examples of ways to ensure checks and tests run quickly:\nRun checks and tests at the right stages of the CI pipeline - e.g. don't run unit tests after deployment to a shared environment when they've already run and passed on a PR / MR.\nRun different suites of checks and tests in parallel, rather than sequentially on the CI pipeline.\nRun tests / checks within each suite in parallel, rather than sequentially on the CI pipeline."},{key:"releaseSmallChangesRegularly",category:"principle",text:"Release small changes regularly to the live system and to other environments, rather than batching many changes into large, infrequent (and risky) releases"},{key:"optimiseBranchingStrategy",category:"principle",text:"Optimise the branching strategy to reduce the risk of merge conflicts, etc., and to allow quick releases (high velocity)"},{key:"useSimpleBranchingWorkflow",category:"action",text:"Use a simple branching workflow, such as GitHub Flow, with temporary / feature / bug branches, protected permanent branches, and frequent merging"},{key:"protectPermanentBranchesAndEnvironments",category:"principle",text:"Protect permanent branches and shared environments"},{key:"avoidShortcutsThatBypassNormalReviewTestAndDeploymentProcess",category:"principle",text:"Avoid shortcuts that bypass the normal review, test and deployment process"},{key:"examplesOfShortcutsToAvoid",category:"example",text:"Examples of shortcuts to avoid:\nRunning SQL directly against a database to change application data or schema, except through an agreed emergency / change-control process.\nManually changing environment configuration instead of using version-controlled configuration and deployment automation.\nPatching code directly on a server or container rather than deploying a reviewed change.\nDisabling checks and tests or bypassing branch protections to get a change released."},{key:"runRelevantChecksAndTestsBeforeDeployment",category:"principle",text:"Run relevant checks and tests before code is merged into a permanent branch and deployed to the first shared environment"},{key:"runRegressionChecksAndTests",category:"principle",text:"Run new checks and tests but also existing checks and tests as regression checks to confirm that new changes have not broken existing functionality"},{key:"preventDirectCommitsToPermanentBranches",category:"action",text:"Configure the CI pipeline to prevent direct commits to permanent branches - i.e. enforce creation of PRs / MRs on temporary / feature / bug branches"},{key:"runChecksAndTestsOnPRs",category:"action",text:"Configure the CI pipeline to automatically run relevant checks and tests when a PR / MR is raised or updated"},{key:"examplesOfChecksAndTestsOnPRs",category:"example",text:'Examples of checks and tests to run on PRs / MRs:\nCode compiles / builds successfully (I always like my code to compile / build).\nThe number of build warnings on the temporary branch does not exceed the number of warnings on the associated permanent branch.\nCode is formatted correctly.\nCode conforms to style guidelines (linting).\nSecurity checks pass.\nAI review checks pass.\nUnit tests pass.\nIntegration tests pass.\nCode coverage thresholds are met.\nContract tests pass.\nHigh-level functional tests pass.\nSingle-service performance tests pass.\nNote: avoid checks which automatically update or "fix" code on CI (e.g. code formatting, linting, etc.), in case changes have unintended consequences - instead use CI to highlight issues.'},{key:"reviewPRs",category:"action",text:"Configure the CI pipeline to enforce peer review and approval of PRs / MRs"},{key:"examplesOfConsiderationsWhenReviewingPRs",category:"example",text:'Examples of considerations when reviewing PRs / MRs (which might not necessarily be covered by formatting and linting checks, automated tests, etc.):\nDoes the code solve the right problem?\nAre important edge cases and failure paths handled?\nIs the design simple and maintainable?\nDoes it respect existing architecture and boundaries?\nAre the tests meaningful, not just present?\nCould this introduce security, privacy, or permission issues?\nCould this cause performance or scalability problems?\nIs data handled safely, especially with concurrency and migrations?\nIs the user experience clear, accessible, and consistent?\nHave code coverage thresholds been increased, or not decreased, where applicable?\nCan any lines of code or configuration be removed? E.g. unused / unreferenced code, commented-out code, "to-dos".\nIs logic duplicated, with the opportunity for code to be refactored / simplified?\nWill this be observable and supportable in production?\nIs the change safe to deploy and roll back?\nIs any necessary documentation updated?'},{key:"allowMergingOnlyAfterApproval",category:"action",text:"Configure the CI pipeline to allow merging to a permanent branch only once a PR / MR has been updated from the relevant permanent branch, has passed all checks and tests, and been approved by peers"},{key:"deployAfterMergingPR",category:"action",text:"Configure the CI pipeline to automatically deploy to the first shared environment once a PR / MR has been merged"},{key:"keepSourceControlWorkflowClear",category:"principle",text:"Keep source-control workflow clear, focused and easy to understand"},{key:"areaSourceControlHygiene",category:"area",text:"Source-control hygiene",anchorKey:"keepSourceControlWorkflowClear"},{key:"examplesOfWaysToKeepSourceControlWorkflowClear",category:"example",text:'Examples of ways to keep source-control workflow clear, focused and easy to understand:\nUse branch names which identify the work item and purpose, e.g. "feature/ABC-123-add-payment-validation".\nWrite clear commit messages which reference the work item (e.g. Jira ticket) and explain the change, e.g. "ABC-123: Add payment validation".\nKeep commits small and logical where practical.\nAvoid committing generated files, local config, secrets or unrelated changes.\nEnsure PR / MR titles and descriptions are clear and link to the relevant work item (e.g. Jira ticket).\nBefore merging a PR / MR, squash incremental commits into a single commit, where relevant.\nDelete merged and unused branches.'},{key:"checkForEnvironmentalIssues",category:"principle",text:"Check for environmental issues"},{key:"examplesOfEnvironmentalIssues",category:"example",text:"Examples of environmental issues (which may highlight issues in the live system too):\nMissing or incorrect configuration entries.\nNetwork connectivity issues.\nInsufficient system resources (e.g. memory, disk space)."},{key:"smokeTestsOnEnvironments",category:"action",text:"Immediately after deployment to an environment, configure the CI pipeline to automatically run a subset of key functional tests as environmental smoke tests"},{key:"blockMergeOrDeploymentOnFailedChecksAndTests",category:"action",text:"Configure the CI pipeline to block merge or deployment when required checks or tests fail"},{key:"notifyTeamOnFailedBuilds",category:"action",text:"Notify the team immediately when a build fails, so issues can be fixed as soon as possible"}],rawLinks=[{from:"title",to:"overallAim"},{from:"overallAim",to:"addValue"},{from:"addValue",to:"costEffective"},{from:"costEffective",to:"optimiseTeamDynamicsAndWorkingPractices"},{from:"optimiseTeamDynamicsAndWorkingPractices",to:"aimToBakeInQualityAndTesting"},{fro
